
services:
  app:
    build: .
    container_name: vendorbot-cpq
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: vendorbot-cpq_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vendorbot-cpq
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"   # avoid local conflict
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: vendorbot-cpq_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  dbdata:
